<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drift Racing</title>
    <style>
        :root {
            color-scheme: dark;
            --panel: rgba(12, 18, 30, 0.88);
            --panel-strong: rgba(8, 12, 20, 0.94);
            --border: rgba(255, 255, 255, 0.14);
            --accent: #ffb100;
            --accent-2: #48b8ff;
            --danger: #ff5b5b;
            --text: #f4f6fb;
            --muted: #b8c0d4;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #87ceeb 0%, #c3f1ff 100%);
            touch-action: none;
            font-family: Arial, sans-serif;
            color: var(--text);
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
        }

        .overlay.visible {
            display: block;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
        }

        #main-menu {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.18), rgba(10, 20, 30, 0.74));
        }

        #main-menu.visible {
            display: flex;
        }

        #main-menu .panel {
            width: min(92vw, 520px);
            padding: 24px;
        }

        h1, h2, h3, p {
            margin: 0;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .mode-card {
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .mode-card:hover,
        .mode-card.selected {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.09);
        }

        .mode-card strong {
            display: block;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .mode-card span {
            color: var(--muted);
            line-height: 1.4;
            font-size: 0.95rem;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        select,
        input,
        button {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font: inherit;
            padding: 12px 14px;
        }

        button {
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent), #ff7f11);
            color: #111;
            border: 0;
            font-weight: 700;
        }

        button.secondary {
            background: linear-gradient(135deg, var(--accent-2), #2f7bff);
            color: #08111e;
            border: 0;
            font-weight: 700;
        }

        button.danger {
            background: rgba(255, 91, 91, 0.2);
            border-color: rgba(255, 91, 91, 0.35);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #top-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 12;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            pointer-events: none;
        }

        #top-bar.visible {
            display: flex;
        }

        #status-card,
        #editor-panel {
            pointer-events: auto;
            padding: 14px 16px;
        }

        #status-card {
            min-width: 220px;
            max-width: 360px;
        }

        #status-card p {
            margin-top: 6px;
            color: var(--muted);
            line-height: 1.35;
            font-size: 0.92rem;
        }

        #speedometer {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
            color: var(--text);
            font-weight: 700;
            letter-spacing: 0.04em;
            display: none;
        }

        #speedometer.visible {
            display: block;
        }

        #speedometer.speed-warning {
            background: linear-gradient(180deg, rgba(255, 177, 0, 0.22), rgba(255, 127, 17, 0.12));
            box-shadow: inset 0 0 0 1px rgba(255, 177, 0, 0.18);
        }

        #speedometer.speed-critical {
            background: linear-gradient(180deg, rgba(255, 91, 91, 0.24), rgba(255, 91, 91, 0.12));
            box-shadow: inset 0 0 0 1px rgba(255, 91, 91, 0.25);
        }

        .speedometer-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.12em;
        }

        .speedometer-value {
            margin-top: 4px;
            font-size: 2rem;
            line-height: 1;
        }

        .speedometer-meta {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        #editor-panel {
            width: min(92vw, 420px);
            display: none;
        }

        #editor-panel.visible {
            display: block;
        }

        .tool-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tool-row button.active {
            background: rgba(255, 177, 0, 0.22);
            border-color: rgba(255, 177, 0, 0.45);
        }

        .editor-settings {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .editor-settings.hidden {
            display: none;
        }

        .editor-settings input {
            width: 100%;
        }

        #editor-help,
        #save-feedback {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.4;
        }

        #save-feedback {
            min-height: 20px;
        }

        #ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32%;
            pointer-events: none;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            z-index: 10;
        }

        #ui-layer.visible {
            display: flex;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .btn {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.28);
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active,
        .btn.active {
            background: rgba(255, 255, 255, 0.78);
            color: black;
        }

        @media (max-width: 760px) {
            #top-bar {
                flex-direction: column;
            }

            #editor-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="main-menu" class="overlay visible">
    <div class="panel stack">
        <div class="stack" style="gap: 8px;">
            <h1>Drift Racing</h1>
            <p style="color: var(--muted); line-height: 1.45;">
                Välj om du vill köra en bana eller bygga en egen karta med ramper och vattenbassänger.
            </p>
        </div>

        <div class="mode-grid">
            <button class="mode-card selected" data-mode="drive" type="button">
                <strong>Drive Mode</strong>
                <span>Välj karta och kör direkt.</span>
            </button>
            <button class="mode-card" data-mode="editor" type="button">
                <strong>Editor Mode</strong>
                <span>Placera ut objekt och spara banan lokalt.</span>
            </button>
        </div>

        <label>
            Välj karta
            <select id="menu-map-select"></select>
        </label>

        <label>
            Kartnamn för editor
            <input id="menu-map-name" type="text" placeholder="t.ex. Hamnbanan">
        </label>

        <div class="button-row">
            <button id="start-button" class="primary" type="button">Starta</button>
        </div>
    </div>
</div>

<div id="top-bar">
    <div id="status-card" class="panel">
        <h3 id="status-title">Drive Mode</h3>
        <p id="status-text">Välj en karta i menyn.</p>
        <div id="speedometer">
            <div class="speedometer-label">Hastighet</div>
            <div id="speedometer-value" class="speedometer-value">0 km/h</div>
            <div class="speedometer-meta">
                <span id="speedometer-top">Topp: 0 km/h</span>
                <span id="speedometer-max">Max: 400 km/h</span>
            </div>
        </div>
        <div class="button-row" style="margin-top: 10px;">
            <button id="return-editor" class="secondary" type="button" style="display: none;">Tillbaka till editor</button>
        </div>
    </div>

    <div id="editor-panel" class="panel stack">
        <div class="stack" style="gap: 6px;">
            <h3>Editor</h3>
            <p id="editor-help">Klicka på marken för att placera valt objekt.</p>
        </div>

        <div class="tool-row">
            <button id="tool-ramp" class="active" type="button">Ramp</button>
            <button id="tool-water" type="button">Vatten</button>
            <button id="tool-delete" type="button">Ta bort</button>
        </div>

        <div class="button-row">
            <button id="rotate-left" type="button">Rotera -15°</button>
            <button id="rotate-right" type="button">Rotera +15°</button>
        </div>

        <div id="ramp-settings" class="editor-settings">
            <label>
                Ramp längd
                <input id="ramp-length" type="number" min="4" max="40" step="1" value="8">
            </label>
            <label>
                Ramp höjd
                <input id="ramp-height" type="number" min="1" max="16" step="0.5" value="2">
            </label>
        </div>

        <label>
            Kartnamn
            <input id="editor-map-name" type="text" placeholder="Ny bana">
        </label>

        <div class="button-row">
            <button id="test-drive" class="secondary" type="button">Provkör karta</button>
            <button id="save-map" class="secondary" type="button">Spara karta</button>
            <button id="new-map" type="button">Ny tom karta</button>
            <button id="back-menu" class="danger" type="button">Till meny</button>
        </div>

        <p id="save-feedback"></p>
    </div>
</div>

<div id="ui-layer">
    <div class="btn-group">
        <div class="btn" id="btn-left">←</div>
        <div class="btn" id="btn-right">→</div>
    </div>
    <div class="btn-group">
        <div class="btn" id="btn-brake">B/R</div>
        <div class="btn" id="btn-gas">GAS</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const STORAGE_KEY = 'drift-racing-custom-maps-v1';
    const mapBounds = { min: -95, max: 95 };
    const rampLimits = { minLength: 4, maxLength: 40, minHeight: 1, maxHeight: 16 };

    const defaultMaps = [
        {
            id: 'classic-circuit',
            name: 'Classic Circuit',
            builtIn: true,
            objects: [
                { id: crypto.randomUUID(), type: 'ramp', x: -8, z: -18, rotation: 0.35 },
                { id: crypto.randomUUID(), type: 'ramp', x: 24, z: 18, rotation: -1.05 },
                { id: crypto.randomUUID(), type: 'water', x: -28, z: 22, rotation: 0 },
                { id: crypto.randomUUID(), type: 'water', x: 32, z: -14, rotation: 0 }
            ]
        },
        {
            id: 'harbor-run',
            name: 'Harbor Run',
            builtIn: true,
            objects: [
                { id: crypto.randomUUID(), type: 'ramp', x: -30, z: 0, rotation: Math.PI / 2 },
                { id: crypto.randomUUID(), type: 'ramp', x: 8, z: 32, rotation: Math.PI },
                { id: crypto.randomUUID(), type: 'water', x: 0, z: -28, rotation: 0 },
                { id: crypto.randomUUID(), type: 'water', x: 36, z: 30, rotation: 0 }
            ]
        },
        {
            id: 'jump-challenge',
            name: 'Jump Challenge',
            builtIn: true,
            start: { x: 0, z: 95, angle: Math.PI },
            mission: {
                type: 'jump-zone',
                title: 'Jump Challenge',
                description: 'Ta maxfart, flyg over ett enormt bilhav och landa extremt langt bort i den grona zonen.',
                landingZone: { x: 0, z: -88, width: 24, depth: 18, rotation: 0 },
                failLineOffset: 16,
                obstacleCars: [
                    { x: -10, z: 18, rotation: 0 },
                    { x: -5, z: 18, rotation: 0 },
                    { x: 0, z: 18, rotation: 0 },
                    { x: 5, z: 18, rotation: 0 },
                    { x: 10, z: 18, rotation: 0 },
                    { x: -10, z: 12, rotation: 0 },
                    { x: -5, z: 12, rotation: 0 },
                    { x: 0, z: 12, rotation: 0 },
                    { x: 5, z: 12, rotation: 0 },
                    { x: 10, z: 12, rotation: 0 },
                    { x: -10, z: 6, rotation: 0 },
                    { x: -5, z: 6, rotation: 0 },
                    { x: 0, z: 6, rotation: 0 },
                    { x: 5, z: 6, rotation: 0 },
                    { x: 10, z: 6, rotation: 0 },
                    { x: -10, z: 0, rotation: 0 },
                    { x: -5, z: 0, rotation: 0 },
                    { x: 0, z: 0, rotation: 0 },
                    { x: 5, z: 0, rotation: 0 },
                    { x: 10, z: 0, rotation: 0 },
                    { x: -10, z: -6, rotation: 0 },
                    { x: -5, z: -6, rotation: 0 },
                    { x: 0, z: -6, rotation: 0 },
                    { x: 5, z: -6, rotation: 0 },
                    { x: 10, z: -6, rotation: 0 },
                    { x: -10, z: -12, rotation: 0 },
                    { x: -5, z: -12, rotation: 0 },
                    { x: 0, z: -12, rotation: 0 },
                    { x: 5, z: -12, rotation: 0 },
                    { x: 10, z: -12, rotation: 0 },
                    { x: -10, z: -18, rotation: 0 },
                    { x: -5, z: -18, rotation: 0 },
                    { x: 0, z: -18, rotation: 0 },
                    { x: 5, z: -18, rotation: 0 },
                    { x: 10, z: -18, rotation: 0 },
                    { x: -10, z: -24, rotation: 0 },
                    { x: -5, z: -24, rotation: 0 },
                    { x: 0, z: -24, rotation: 0 },
                    { x: 5, z: -24, rotation: 0 },
                    { x: 10, z: -24, rotation: 0 }
                ]
            },
            objects: [
                { id: crypto.randomUUID(), type: 'ramp', x: 0, z: 26, rotation: 0, rampLength: 34, rampHeight: 11 }
            ]
        }
    ];

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87ceeb, 35, 145);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.72);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(100, 100, 50);
    dirLight.castShadow = true;
    dirLight.shadow.camera.top = 80;
    dirLight.shadow.camera.bottom = -80;
    dirLight.shadow.camera.left = -80;
    dirLight.shadow.camera.right = 80;
    scene.add(dirLight);

    function createTrackTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 2048;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, 0, 2048, 2048);

        ctx.lineWidth = 180;
        ctx.strokeStyle = '#333';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(600, 500);
        ctx.bezierCurveTo(1800, 500, 1800, 1500, 1000, 1500);
        ctx.bezierCurveTo(200, 1500, 200, 500, 600, 500);
        ctx.stroke();

        ctx.lineWidth = 20;
        ctx.setLineDash([40, 40]);
        ctx.strokeStyle = '#fff';
        ctx.stroke();
        ctx.lineDashOffset = 40;
        ctx.strokeStyle = '#f00';
        ctx.stroke();
        ctx.setLineDash([]);

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        return texture;
    }

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ map: createTrackTexture() })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(200, 20, 0xffffff, 0xffffff);
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.14;
    gridHelper.visible = false;
    scene.add(gridHelper);

    const carGroup = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe53935, roughness: 0.74, metalness: 0.1 });
    const trimMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.65, metalness: 0.15 });
    const lightMat = new THREE.MeshStandardMaterial({
        color: 0xfaf2c0,
        emissive: 0xfaf2c0,
        emissiveIntensity: 0.25,
        roughness: 0.4
    });

    const carBody = new THREE.Group();

    const mainShell = new THREE.Mesh(new THREE.BoxGeometry(1.28, 0.34, 2.16), bodyMat);
    mainShell.position.y = 0.76;
    mainShell.castShadow = true;
    carBody.add(mainShell);

    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.18, 0.18, 0.9), bodyMat);
    hood.position.set(0, 0.84, 0.6);
    hood.rotation.x = -0.08;
    hood.castShadow = true;
    carBody.add(hood);

    const nose = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.16, 0.42), bodyMat);
    nose.position.set(0, 0.72, 1.18);
    nose.rotation.x = 0.12;
    nose.castShadow = true;
    carBody.add(nose);

    const rearDeck = new THREE.Mesh(new THREE.BoxGeometry(1.16, 0.18, 0.72), bodyMat);
    rearDeck.position.set(0, 0.86, -0.72);
    rearDeck.rotation.x = 0.05;
    rearDeck.castShadow = true;
    carBody.add(rearDeck);

    const cabinBase = new THREE.Mesh(new THREE.BoxGeometry(1.02, 0.24, 0.86), trimMat);
    cabinBase.position.set(0, 0.98, -0.02);
    cabinBase.castShadow = true;
    carBody.add(cabinBase);

    const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.26, 0.14), trimMat);
    windshield.position.set(0, 1.06, 0.28);
    windshield.rotation.x = -0.58;
    windshield.castShadow = true;
    carBody.add(windshield);

    const carWindow = new THREE.Mesh(new THREE.BoxGeometry(0.92, 0.14, 0.52), new THREE.MeshStandardMaterial({
        color: 0x101820,
        transparent: true,
        opacity: 0.82,
        roughness: 0.2,
        metalness: 0.1
    }));
    carWindow.position.set(0, 1.08, -0.02);
    carBody.add(carWindow);

    const headlightLeft = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.06, 0.14), lightMat);
    headlightLeft.position.set(-0.34, 0.81, 1.09);
    carBody.add(headlightLeft);

    const headlightRight = headlightLeft.clone();
    headlightRight.position.x = 0.34;
    carBody.add(headlightRight);

    const grille = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.08, 0.06), trimMat);
    grille.position.set(0, 0.69, 1.24);
    carBody.add(grille);

    const mirrorLeft = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, 0.12), trimMat);
    mirrorLeft.position.set(-0.6, 0.98, 0.2);
    carBody.add(mirrorLeft);

    const mirrorRight = mirrorLeft.clone();
    mirrorRight.position.x = 0.6;
    carBody.add(mirrorRight);

    const taillightLeft = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.06, 0.08), new THREE.MeshStandardMaterial({
        color: 0xaa1f24,
        emissive: 0x440000,
        emissiveIntensity: 0.18,
        roughness: 0.55
    }));
    taillightLeft.position.set(-0.32, 0.82, -1.13);
    carBody.add(taillightLeft);

    const taillightRight = taillightLeft.clone();
    taillightRight.position.x = 0.32;
    carBody.add(taillightRight);

    carGroup.add(carBody);

    const wheelRadius = 0.22;
    const wheelThickness = 0.18;
    const wheelOffsetX = 0.52;
    const frontAxleZ = 0.88;
    const rearAxleZ = -0.88;
    const wheelSpinTargets = [];
    const tempVector = new THREE.Vector3();
    const supportEuler = new THREE.Euler(0, 0, 0, 'YXZ');
    const supportMatrix = new THREE.Matrix4();

    function createWheel() {
        const wheelGroup = new THREE.Group();
        const tire = new THREE.Mesh(
            new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelThickness, 18),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
        );
        // Rotate so the flat sides face outward left/right.
        tire.rotation.z = Math.PI / 2;
        tire.castShadow = true;
        tire.receiveShadow = true;
        wheelGroup.add(tire);

        const rim = new THREE.Mesh(
            new THREE.CylinderGeometry(wheelRadius * 0.58, wheelRadius * 0.58, wheelThickness + 0.02, 12),
            new THREE.MeshStandardMaterial({ color: 0xbfc7d6, roughness: 0.35, metalness: 0.75 })
        );
        rim.rotation.z = Math.PI / 2;
        wheelGroup.add(rim);

        return wheelGroup;
    }

    function addWheel(x, y, z, front = false) {
        const steeringPivot = new THREE.Group();
        steeringPivot.position.set(x, y, z);

        const spinPivot = new THREE.Group();
        const wheel = createWheel();
        spinPivot.add(wheel);
        steeringPivot.add(spinPivot);
        carGroup.add(steeringPivot);

        wheelSpinTargets.push({ steeringPivot, spinPivot, front, localX: x, localZ: z, baseY: y });
    }

    addWheel(-wheelOffsetX, wheelRadius, frontAxleZ, true);
    addWheel(wheelOffsetX, wheelRadius, frontAxleZ, true);

    function sanitizeObject(object) {
        if (!object || !['ramp', 'water'].includes(object.type)) {
            return null;
        }

        const rampLength = THREE.MathUtils.clamp(Number(object.rampLength) || 8, rampLimits.minLength, rampLimits.maxLength);
        const rampHeight = THREE.MathUtils.clamp(Number(object.rampHeight) || 2, rampLimits.minHeight, rampLimits.maxHeight);

        return {
            id: object.id || crypto.randomUUID(),
            type: object.type,
            x: THREE.MathUtils.clamp(Number(object.x) || 0, mapBounds.min, mapBounds.max),
            z: THREE.MathUtils.clamp(Number(object.z) || 0, mapBounds.min, mapBounds.max),
            rotation: Number(object.rotation) || 0,
            rampLength: object.type === 'ramp' ? rampLength : undefined,
            rampHeight: object.type === 'ramp' ? rampHeight : undefined
        };
    }

    function loadCustomMaps() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return [];

            return parsed.map((map) => ({
                id: String(map.id || crypto.randomUUID()),
                name: String(map.name || 'Untitled Map'),
                builtIn: false,
                objects: Array.isArray(map.objects) ? map.objects.map(sanitizeObject).filter(Boolean) : []
            }));
        } catch (error) {
            console.error('Kunde inte ladda sparade kartor', error);

    function createRampMesh(object) {
        const group = new THREE.Group();
        const rampLength = THREE.MathUtils.clamp(Number(object.rampLength) || 8, rampLimits.minLength, rampLimits.maxLength);
        const rampHeight = THREE.MathUtils.clamp(Number(object.rampHeight) || 2, rampLimits.minHeight, rampLimits.maxHeight);
        const rampWidth = 6;
        const profile = new THREE.Shape();
        profile.moveTo(-rampLength / 2, 0);
        profile.lineTo(rampLength / 2, rampHeight);
        profile.lineTo(rampLength / 2, 0);
        profile.lineTo(-rampLength / 2, 0);

        const rampGeometry = new THREE.ExtrudeGeometry(profile, {
            depth: rampWidth,
            bevelEnabled: false
        });
        rampGeometry.rotateY(Math.PI / 2);
        rampGeometry.translate(-rampWidth / 2, 0, 0);

        const rampMesh = new THREE.Mesh(
            rampGeometry,
            new THREE.MeshStandardMaterial({ color: 0xa86a21, roughness: 0.82 })
        );
        rampMesh.castShadow = true;
        rampMesh.receiveShadow = true;
        group.add(rampMesh);
        group.userData.surfaceMesh = rampMesh;

        group.position.set(object.x, 0, object.z);
        group.rotation.y = object.rotation;
        return group;
    }

    function moveTowards(value, target, maxDelta) {
        if (value < target) return Math.min(value + maxDelta, target);
        if (value > target) return Math.max(value - maxDelta, target);
        return target;
    }

    function getWheelSamplePosition(localX, localZ, angle) {
        const sin = Math.sin(angle);
        const cos = Math.cos(angle);
        return new THREE.Vector3(
            carGroup.position.x + (localX * cos) + (localZ * sin),
            carGroup.position.y,
            carGroup.position.z + (-localX * sin) + (localZ * cos)
        );
    }

    function getWheelSurfaces(angle) {
        return wheelSpinTargets.map((wheelTarget) => ({
            wheelTarget,
            ...sampleSurfaceAt(getWheelSamplePosition(wheelTarget.localX, wheelTarget.localZ, angle), angle)
        }));
    }

    function getSupportState(angle) {
        const wheelSurfaces = getWheelSurfaces(angle);
        const [frontLeft, frontRight, rearLeft, rearRight] = wheelSurfaces;
        const frontHeight = (frontLeft.height + frontRight.height) / 2;
        const rearHeight = (rearLeft.height + rearRight.height) / 2;
        const leftHeight = (frontLeft.height + rearLeft.height) / 2;
        const rightHeight = (frontRight.height + rearRight.height) / 2;
        const targetPitch = THREE.MathUtils.clamp(
            -Math.atan2(frontHeight - rearHeight, frontAxleZ - rearAxleZ),
            -0.95,
            0.7
        );
        const targetRoll = THREE.MathUtils.clamp(
            Math.atan2(rightHeight - leftHeight, wheelOffsetX * 2),
            -0.5,
            0.5
        );

        supportEuler.set(targetPitch, 0, targetRoll, 'YXZ');
        supportMatrix.makeRotationFromEuler(supportEuler);

        let supportHeight = 0;
        for (const surface of wheelSurfaces) {
            const rotatedOffset = new THREE.Vector3(
                surface.wheelTarget.localX,
                surface.wheelTarget.baseY,
                surface.wheelTarget.localZ
            ).applyMatrix4(supportMatrix);
            supportHeight += surface.height + wheelRadius - rotatedOffset.y;
        }
        supportHeight /= wheelSurfaces.length;

        let dominantSurface = null;
        for (const surface of wheelSurfaces) {
            if (!surface.contact) continue;
            if (!dominantSurface || surface.progress > dominantSurface.progress) {
                dominantSurface = surface;
            }
        }

        return { wheelSurfaces, supportHeight, targetPitch, targetRoll, dominantSurface };
    }

    function setWheelContactHeight(wheelTarget, surfaceHeight) {
        const rotationMatrix = new THREE.Matrix4().makeRotationFromEuler(
            new THREE.Euler(physics.pitch, physics.angle, physics.roll, 'YXZ')
        );
        const baseVector = new THREE.Vector3(wheelTarget.localX, 0, wheelTarget.localZ).applyMatrix4(rotationMatrix);
        const upVector = new THREE.Vector3(0, 1, 0).applyMatrix4(rotationMatrix);
        const desiredWorldY = surfaceHeight + wheelRadius;
        const localY = (desiredWorldY - carGroup.position.y - baseVector.y) / Math.max(upVector.y, 0.0001);
        wheelTarget.steeringPivot.position.y = THREE.MathUtils.clamp(localY, wheelTarget.baseY - 0.04, wheelTarget.baseY + 0.32);
    }

    function resetCar() {
        const currentMap = getCurrentMap();
        const start = currentMap?.start || { x: -20, z: -25, angle: Math.PI };
        carGroup.position.set(start.x, wheelRadius, start.z);
        carGroup.rotation.set(0, start.angle, 0);
        physics.speed = 0;
        physics.angle = start.angle;
        physics.velocityX = 0;
        physics.velocityZ = 0;
        physics.verticalVelocity = 0;
        physics.onGround = true;
        physics.pitch = 0;
        physics.pitchVelocity = 0;
        physics.roll = 0;
        physics.rampContactId = null;
        physics.rampProgress = 0;
        physics.rampAngle = 0;
        physics.rampHeight = 0;
        physics.rampAlignment = 0;
        physics.justLaunched = false;
        appState.topSpeed = 0;
        appState.missionState = currentMap?.mission ? { airborne: false, completed: false, failed: false } : null;
        const startSupport = getSupportState(physics.angle);
        carGroup.position.y = startSupport.supportHeight;
        physics.pitch = startSupport.targetPitch;
        physics.roll = startSupport.targetRoll;
        carGroup.rotation.set(physics.pitch, physics.angle, physics.roll, 'YXZ');
        for (const surface of startSupport.wheelSurfaces) {
            setWheelContactHeight(surface.wheelTarget, surface.height);
        }
    }

    function isPointInsideLandingZone(point, zone) {
        const local = new THREE.Vector3(point.x - zone.x, 0, point.z - zone.z);
        local.applyAxisAngle(new THREE.Vector3(0, 1, 0), -zone.rotation);
        return Math.abs(local.x) <= zone.width / 2 && Math.abs(local.z) <= zone.depth / 2;
    }

    function isPointBeforeLandingZone(point, mission) {
        const zone = mission.landingZone;
        const local = new THREE.Vector3(point.x - zone.x, 0, point.z - zone.z);
        local.applyAxisAngle(new THREE.Vector3(0, 1, 0), -zone.rotation);
        return local.z > (zone.depth / 2) + mission.failLineOffset;
    }

    function updateMissionStatus() {
        if (appState.mode !== 'drive' || appState.testDriveActive) return;
        const map = getCurrentMap();
        if (!map?.mission || map.mission.type !== 'jump-zone') return;
        const missionState = appState.missionState;
        if (!missionState) return;

        if (missionState.completed) {
            setStatus(map.mission.title, 'Perfekt landning. Du klarade stuntbanan.');
            return;
        }
        if (missionState.failed) {
            setStatus(map.mission.title, 'Du landade for tidigt. Ta mer fart och traffa den grona zonen.');
            return;
        }

        if (missionState.airborne) {
            setStatus(map.mission.title, map.mission.description);
        } else {
            setStatus(map.mission.title, 'Ta fart mot rampen och hoppa over bilarna in i den grona zonen.');
        }
    }

    function spawnSkidmark(x, z, angle) {

    function findRampAtPosition(position) {
        for (const entry of mapObjectMeshes) {
            if (entry.object.type !== 'ramp') continue;

            const local = entry.mesh.worldToLocal(position.clone());
            const halfWidth = 3;
            const halfLength = (entry.object.rampLength || 8) / 2;
            if (Math.abs(local.x) <= halfWidth && Math.abs(local.z) <= halfLength) {
                return { entry, local };
            }
        }
        return null;
    }

    function findWaterAtPosition(position) {
        for (const entry of mapObjectMeshes) {
            if (entry.object.type !== 'water') continue;
            const dx = position.x - entry.object.x;
            const dz = position.z - entry.object.z;
            if ((dx * dx) + (dz * dz) <= 6 * 6) return entry;
        }
        return null;
    }

    function sampleSurfaceAt(position, carAngle) {
        const origin = new THREE.Vector3(position.x, 50, position.z);
        surfaceRaycaster.set(origin, new THREE.Vector3(0, -1, 0));
        const hits = surfaceRaycaster.intersectObjects(collidableSurfaces, false);
        const hit = hits[0];
        if (!hit) {
            return { height: 0, pitch: 0, contact: false, progress: 0, angle: 0, rampHeight: 0, alignment: 0, contactId: null };
        }

        const entry = surfaceMeshToEntry.get(hit.object.uuid);
        if (!entry) {
            return { height: hit.point.y, pitch: 0, contact: false, progress: 0, angle: 0, rampHeight: 0, alignment: 0, contactId: null };
        }

        const localPoint = entry.mesh.worldToLocal(hit.point.clone());
        const rampLength = entry.object.rampLength || 8;
        const rampHeight = entry.object.rampHeight || 2;
        const rampProgress = THREE.MathUtils.clamp(((rampLength / 2) - localPoint.z) / rampLength, 0, 1);
        const rampAngle = Math.atan2(rampHeight, rampLength);
        const rampForward = new THREE.Vector3(0, 0, -1).applyQuaternion(entry.mesh.getWorldQuaternion(new THREE.Quaternion())).normalize();
        const carForward = new THREE.Vector3(Math.sin(carAngle), 0, Math.cos(carAngle)).normalize();
        const alignment = rampForward.dot(carForward);

        return {
            height: hit.point.y,
            pitch: -rampAngle * THREE.MathUtils.clamp(alignment, -1, 1),
            contact: true,
            progress: rampProgress,
            angle: rampAngle,
            rampHeight,
            alignment,
            contactId: entry.object.id
        };
    }

    function resolveRampSurfaceCollisions() {
        const carCollisionRadius = 0.78;
        const carCollisionBottom = carGroup.position.y + 0.18;
        const carCollisionTop = carGroup.position.y + 1.18;

        for (const entry of mapObjectMeshes) {
            if (entry.object.type !== 'ramp') continue;

            const rampLength = entry.object.rampLength || 8;
            const rampHeight = entry.object.rampHeight || 2;
            const halfLength = rampLength / 2;
            const halfWidth = 3;
            const localPoint = entry.mesh.worldToLocal(new THREE.Vector3(
                carGroup.position.x,
                carCollisionBottom,
                carGroup.position.z
            ));
            const insideRampFootprint =
                Math.abs(localPoint.x) <= halfWidth &&
                localPoint.z >= -halfLength &&
                localPoint.z <= halfLength;

            // When the car is already on the ramp footprint, vertical wheel support
            // should carry it up the slope instead of the side-collision solver
            // pushing it horizontally away from the ramp body.
            if (insideRampFootprint) continue;

            const closestX = THREE.MathUtils.clamp(localPoint.x, -halfWidth, halfWidth);
            const closestZ = THREE.MathUtils.clamp(localPoint.z, -halfLength, halfLength);
            const deltaX = localPoint.x - closestX;
            const deltaZ = localPoint.z - closestZ;
            const horizontalDistanceSq = (deltaX * deltaX) + (deltaZ * deltaZ);
            const surfaceAtClosestZ = THREE.MathUtils.clamp((halfLength - closestZ) / rampLength, 0, 1) * rampHeight;
            const overlapsVertically = carCollisionBottom < surfaceAtClosestZ && carCollisionTop > 0;

            if (!overlapsVertically || horizontalDistanceSq >= carCollisionRadius * carCollisionRadius) continue;

            let localNormalX = 0;
            let localNormalZ = 0;
            let penetration = 0;

            if (horizontalDistanceSq > 1e-6) {
                const horizontalDistance = Math.sqrt(horizontalDistanceSq);
                localNormalX = deltaX / horizontalDistance;
                localNormalZ = deltaZ / horizontalDistance;
                penetration = carCollisionRadius - horizontalDistance;
            } else {
                const distanceToSideX = halfWidth - Math.abs(localPoint.x);
                const distanceToSideZ = halfLength - Math.abs(localPoint.z);
                if (distanceToSideX < distanceToSideZ) {
                    localNormalX = localPoint.x >= 0 ? 1 : -1;
                    penetration = carCollisionRadius + distanceToSideX;
                } else {
                    localNormalZ = localPoint.z >= 0 ? 1 : -1;
                    penetration = carCollisionRadius + distanceToSideZ;
                }
            }

            const worldNormal = new THREE.Vector3(localNormalX, 0, localNormalZ)
                .transformDirection(entry.mesh.matrixWorld)
                .normalize();

            carGroup.position.addScaledVector(worldNormal, penetration + 0.01);

            const intoSurface = (physics.velocityX * worldNormal.x) + (physics.velocityZ * worldNormal.z);
            if (intoSurface < 0) {
                physics.velocityX -= worldNormal.x * intoSurface;
                physics.velocityZ -= worldNormal.z * intoSurface;
            }
        }
    }

    function updatePhysics(delta) {
        if (appState.mode !== 'drive') {
            engineAudio.volume = THREE.MathUtils.lerp(engineAudio.volume, 0, 4 * delta);
            driftAudio.volume = THREE.MathUtils.lerp(driftAudio.volume, 0, 4 * delta);
            return;
        }
        const water = findWaterAtPosition(carGroup.position);
        const previousRampContactId = physics.rampContactId;
        const previousRampProgress = physics.rampProgress;
        const previousRampAngle = physics.rampAngle;
        const previousRampHeight = physics.rampHeight;
        const previousRampAlignment = physics.rampAlignment;

        const currentAcceleration = physics.onGround ? physics.acceleration : physics.acceleration * 0.2;
        const currentBraking = physics.onGround ? physics.braking : physics.braking * 0.3;
        const currentFriction = water ? physics.friction * 0.5 : physics.friction;

        if (input.forward) {
            physics.speed += currentAcceleration * delta;
        } else if (input.backward) {
            physics.speed -= currentBraking * delta;
        } else {
            physics.speed = moveTowards(physics.speed, 0, currentFriction * delta);
        }

        if (water) {
            physics.speed *= 1 - (0.22 * delta);
        }

        physics.speed = THREE.MathUtils.clamp(physics.speed, -8, physics.maxSpeed);

        const steeringScale = physics.onGround ? 1 : 0.28;
        const steeringSpeedFactor = THREE.MathUtils.clamp(Math.abs(physics.speed) / 18, 0.18, 1);
        const steeringDirection = physics.speed < 0 ? -1 : 1;
        if (Math.abs(physics.speed) > 0.08) {
            if (input.left) physics.angle += physics.turnSpeed * steeringSpeedFactor * steeringDirection * steeringScale * delta;
            if (input.right) physics.angle -= physics.turnSpeed * steeringSpeedFactor * steeringDirection * steeringScale * delta;
        }

        const targetVelX = Math.sin(physics.angle) * physics.speed;
        const targetVelZ = Math.cos(physics.angle) * physics.speed;
        const grip = physics.onGround ? (water ? 1.1 : 4.6) : 0.75;
        physics.velocityX = THREE.MathUtils.lerp(physics.velocityX, targetVelX, grip * delta);
        physics.velocityZ = THREE.MathUtils.lerp(physics.velocityZ, targetVelZ, grip * delta);

        carGroup.position.x += physics.velocityX * delta;
        carGroup.position.z += physics.velocityZ * delta;
        carGroup.position.x = THREE.MathUtils.clamp(carGroup.position.x, mapBounds.min, mapBounds.max);
        carGroup.position.z = THREE.MathUtils.clamp(carGroup.position.z, mapBounds.min, mapBounds.max);
        resolveRampSurfaceCollisions();

        const supportState = getSupportState(physics.angle);
        const currentSpeed = Math.sqrt((physics.velocityX ** 2) + (physics.velocityZ ** 2));

        if (supportState.dominantSurface) {
            physics.rampContactId = supportState.dominantSurface.contactId;
            physics.rampProgress = supportState.dominantSurface.progress;
            physics.rampAngle = supportState.dominantSurface.angle;
            physics.rampHeight = supportState.dominantSurface.rampHeight;
            physics.rampAlignment = supportState.dominantSurface.alignment;
        } else {
            physics.rampContactId = null;
            physics.rampProgress = 0;
            physics.rampAngle = 0;
            physics.rampHeight = 0;
            physics.rampAlignment = 0;
        }

        const shouldLaunch =
            physics.onGround &&
            previousRampContactId &&
            !physics.rampContactId &&
            previousRampProgress > 0.9 &&
            previousRampAlignment > 0.55 &&
            currentSpeed > 8;

        if (shouldLaunch) {
            physics.onGround = false;
            physics.justLaunched = true;
            if (appState.missionState) {
                appState.missionState.airborne = true;
            }
            physics.verticalVelocity = Math.max(
                physics.verticalVelocity,
                (Math.sin(previousRampAngle) * currentSpeed * 0.9) + (previousRampHeight * 0.35) + 1.4
            );
            physics.pitchVelocity = -previousRampAngle * 2.1;
        }

        if (physics.onGround) {
            carGroup.position.y = THREE.MathUtils.lerp(
                carGroup.position.y,
                supportState.supportHeight,
                Math.min(1, 14 * delta)
            );
            physics.verticalVelocity = 0;
            physics.pitchVelocity = 0;
            physics.pitch = THREE.MathUtils.lerp(physics.pitch, supportState.targetPitch, Math.min(1, 11 * delta));
            physics.roll = THREE.MathUtils.lerp(physics.roll, supportState.targetRoll, Math.min(1, 11 * delta));
            physics.justLaunched = false;
        } else {
            physics.verticalVelocity -= physics.gravity * delta;
            carGroup.position.y += physics.verticalVelocity * delta;
            physics.pitchVelocity += ((-physics.verticalVelocity * 0.018) - (physics.pitch * 0.65)) * delta;
            physics.pitchVelocity *= 1 - (0.8 * delta);
            physics.pitch = THREE.MathUtils.clamp(physics.pitch + physics.pitchVelocity * delta, -0.85, 0.65);
            physics.roll = THREE.MathUtils.lerp(physics.roll, 0, 2.2 * delta);

            if (carGroup.position.y <= supportState.supportHeight && physics.verticalVelocity <= 0) {
                const impactVelocity = Math.abs(physics.verticalVelocity);
                carGroup.position.y = supportState.supportHeight;
                physics.verticalVelocity = 0;
                physics.onGround = true;
                physics.justLaunched = false;
                physics.pitchVelocity = 0;
                physics.pitch = supportState.targetPitch;
                physics.roll = supportState.targetRoll;
                physics.speed *= 1 - (THREE.MathUtils.clamp((impactVelocity - 4) / 18, 0, 1) * 0.14);
                if (impactVelocity > 5.5) {
                    spawnSmoke(
                        carGroup.position.x + (Math.random() - 0.5),
                        0.22 + carGroup.position.y,
                        carGroup.position.z + (Math.random() - 0.5)
                    );
                }

                const map = getCurrentMap();
                if (appState.missionState?.airborne && map?.mission?.type === 'jump-zone') {
                    const landingPoint = { x: carGroup.position.x, z: carGroup.position.z };
                    if (isPointInsideLandingZone(landingPoint, map.mission.landingZone)) {
                        appState.missionState.completed = true;
                    } else if (isPointBeforeLandingZone(landingPoint, map.mission)) {
                        appState.missionState.failed = true;
                        appState.missionState.airborne = false;
                        physics.speed = 0;
                    } else {
                        appState.missionState.airborne = false;
                    }
                }
            }
        }

        carGroup.rotation.set(physics.pitch, physics.angle, physics.roll, 'YXZ');
        for (const surface of supportState.wheelSurfaces) {
            setWheelContactHeight(surface.wheelTarget, surface.height);
        }

        const moveDirAngle = Math.atan2(physics.velocityX, physics.velocityZ);
        let slip = Math.abs(physics.angle - moveDirAngle);
        slip = Math.atan2(Math.sin(slip), Math.cos(slip));
        const slipAmount = Math.abs(slip);
        const steeringAmount = (input.left || input.right) ? 1 : 0;
        const speedFactor = THREE.MathUtils.clamp((currentSpeed - 4) / 12, 0, 1);
        const driftFactor = THREE.MathUtils.clamp((slipAmount - 0.18) / 0.75, 0, 1) * speedFactor * steeringAmount;
        const targetEngineVolume = input.forward ? 0.45 : 0;
        const targetDriftVolume = input.forward ? driftFactor * 0.75 : 0;
        engineAudio.volume = THREE.MathUtils.lerp(engineAudio.volume, targetEngineVolume, 3 * delta);
        driftAudio.volume = THREE.MathUtils.lerp(driftAudio.volume, targetDriftVolume, 3 * delta);

        if (currentSpeed > 5 && slipAmount > 0.3 && physics.onGround) {
            const backX = carGroup.position.x - Math.sin(physics.angle) * 1.0;
            const backZ = carGroup.position.z - Math.cos(physics.angle) * 1.0;
            spawnSkidmark(backX, backZ, physics.angle);
            if (Math.random() > 0.5) {
                spawnSmoke(backX + (Math.random() - 0.5), 0.2 + carGroup.position.y, backZ + (Math.random() - 0.5));
            }
            carBody.position.x = (Math.random() - 0.5) * 0.05;
        } else {
            carBody.position.x = 0;
        }

        const wheelRotationDelta = currentSpeed * delta / wheelRadius;
        const steerTarget = physics.onGround ? ((input.left ? 0.45 : 0) + (input.right ? -0.45 : 0)) : 0;
        for (const wheelTarget of wheelSpinTargets) {
            if (wheelTarget.front) {
                wheelTarget.steeringPivot.rotation.y = THREE.MathUtils.lerp(
                    wheelTarget.steeringPivot.rotation.y,
                    steerTarget,
                    Math.min(1, 10 * delta)
                );
            }
            wheelTarget.spinPivot.rotation.x -= wheelRotationDelta * Math.sign(physics.speed || 1);
        }

        updateMissionStatus();
    }

    function updateCamera() {
        if (appState.mode === 'editor') {
            clampEditorCamera();
            const horizontalDistance = Math.cos(editorCamera.pitch) * editorCamera.distance;
            const target = new THREE.Vector3(editorCamera.targetX, 0, editorCamera.targetZ);
            const desiredX = editorCamera.targetX + Math.sin(editorCamera.yaw) * horizontalDistance;
            const desiredZ = editorCamera.targetZ + Math.cos(editorCamera.yaw) * horizontalDistance;
            const desiredY = Math.sin(editorCamera.pitch) * editorCamera.distance;

            camera.position.x = THREE.MathUtils.lerp(camera.position.x, desiredX, 0.16);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, desiredZ, 0.16);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, desiredY, 0.16);
            camera.lookAt(target);
            return;
        }

        const offsetDist = 7;
        const offsetHeight = 5;
        const targetCamX = carGroup.position.x - Math.sin(physics.angle) * offsetDist;
        const targetCamZ = carGroup.position.z - Math.cos(physics.angle) * offsetDist;
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, targetCamX, 0.1);
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetCamZ, 0.1);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, carGroup.position.y + offsetHeight, 0.1);

        const lookAtTarget = new THREE.Vector3(
            carGroup.position.x + Math.sin(physics.angle) * 3,
            carGroup.position.y,
            carGroup.position.z + Math.cos(physics.angle) * 3
        );
        camera.lookAt(lookAtTarget);
    }

    function updateParticles(delta) {
        for (let i = particles.length - 1; i >= 0; i -= 1) {
            const particle = particles[i];
            particle.life -= delta * 1.5;
            particle.mesh.position.y += delta * 2;
            particle.mesh.scale.setScalar(particle.life * 1.5);
            particle.mesh.material.opacity = particle.life;
            if (particle.life <= 0) {
                scene.remove(particle.mesh);
                particle.mesh.geometry.dispose();
                particle.mesh.material.dispose();
                particles.splice(i, 1);
            }
        }
    }

    function setMenuMode(mode) {
        appState.selectedMenuMode = mode;
        modeCards.forEach((card) => card.classList.toggle('selected', card.dataset.mode === mode));
        const editing = mode === 'editor';
        menuMapName.style.display = editing ? 'block' : 'none';
    }

    function updateToolButtons() {
        toolRamp.classList.toggle('active', appState.selectedTool === 'ramp');
        toolWater.classList.toggle('active', appState.selectedTool === 'water');
        toolDelete.classList.toggle('active', appState.selectedTool === 'delete');
        rampSettings.classList.toggle('hidden', appState.selectedTool !== 'ramp');

        placementPreview.visible = appState.mode === 'editor' && appState.selectedTool !== 'delete';
        if (appState.selectedTool === 'water') {
            placementPreview.geometry.dispose();
            placementPreview.geometry = new THREE.CylinderGeometry(5.5, 5.5, 0.22, 28);
            placementPreview.material.color.set(0x48b8ff);
        } else {
            placementPreview.geometry.dispose();
            placementPreview.geometry = new THREE.BoxGeometry(6, Math.max(appState.rampHeight * 0.25, 0.5), appState.rampLength);
            placementPreview.material.color.set(0xffb100);
        }
    }

    function setAppMode(mode) {
        appState.mode = mode;
        const showMenu = mode === 'menu';
        const showEditor = mode === 'editor';
        const showDrive = mode === 'drive';

        mainMenu.classList.toggle('visible', showMenu);
        topBar.classList.toggle('visible', !showMenu);
        editorPanel.classList.toggle('visible', showEditor);
        uiLayer.classList.toggle('visible', showDrive);
        gridHelper.visible = showEditor;
        placementPreview.visible = showEditor && appState.selectedTool !== 'delete';
        returnEditorButton.style.display = showDrive && appState.testDriveActive ? 'inline-flex' : 'none';
        speedometer.classList.toggle('visible', showDrive);

        if (showMenu) {
            setStatus('Huvudmeny', 'Välj drive mode eller editor mode.');
        } else if (showDrive) {
            if (appState.testDriveActive && appState.editorMap) {
                setStatus('Provkörning', `Testar: ${appState.editorMap.name}. Tryck Escape för att gå tillbaka till editorn.`);
            } else {
                const map = getCurrentMap();
                setStatus('Drive Mode', `Karta: ${map.name}. Mobil: knapparna. Desktop: WASD eller piltangenter.`);
            }
        } else if (showEditor) {
            const mapName = appState.editorMap?.name || 'Ny karta';
            setStatus('Editor Mode', `Redigerar: ${mapName}. WASD panorerar, mushjul zoomar, högerklick roterar kameran.`);
        }
    }

    function createBlankMap(name = 'Ny karta') {
        return {
            id: `custom-${crypto.randomUUID()}`,
            name,
            builtIn: false,
            objects: []
        };
    }

    function openDriveMode(mapId) {
        appState.testDriveActive = false;
        appState.currentMapId = mapId || appState.currentMapId;
        const map = getCurrentMap();
        loadMapIntoScene(map);
        setAppMode('drive');
    }

    function openEditorMode(mapId, requestedName) {
        appState.testDriveActive = false;
        const selected = appState.maps.find((map) => map.id === mapId);
        if (selected && !selected.builtIn) {
            appState.editorMap = cloneMap(selected);
        } else {
            appState.editorMap = createBlankMap((requestedName || '').trim() || 'Ny karta');
        }

        editorMapName.value = appState.editorMap.name;
        rampLengthInput.value = String(appState.rampLength);
        rampHeightInput.value = String(appState.rampHeight);
        buildMapObjects(appState.editorMap);
        resetCar();
        resetEditorCamera();
        clearEffects();
        appState.selectedTool = 'ramp';
        appState.placementRotation = 0;
        saveFeedback.textContent = '';
        editorHelp.textContent = 'Klicka för att placera. WASD panorerar, mushjul zoomar, högerklick drar runt kameran och Shift + vänsterdrag panorerar.';
        updateToolButtons();
        setAppMode('editor');
    }

    function startEditorTestDrive() {
        if (!appState.editorMap) return;
        appState.editorMap.name = editorMapName.value.trim() || 'Ny karta';
        editorMapName.value = appState.editorMap.name;
        appState.testDriveActive = true;
        loadMapIntoScene(appState.editorMap);
        setAppMode('drive');
    }

    function returnFromTestDrive() {
        if (!appState.editorMap) return;
        appState.testDriveActive = false;
        editorMapName.value = appState.editorMap.name;
        buildMapObjects(appState.editorMap);
        resetCar();
        resetEditorCamera();
        clearEffects();
        updateToolButtons();
        setAppMode('editor');
    }

    function upsertMap(map) {
        const index = appState.maps.findIndex((existing) => existing.id === map.id);
        if (index >= 0) {
            appState.maps[index] = cloneMap(map);
        } else {
            appState.maps.push(cloneMap(map));
        }
        appState.currentMapId = map.id;
        saveCustomMaps();
        refreshMaps();
        menuMapSelect.value = map.id;
    }

    function saveEditorMap() {
        if (!appState.editorMap) return;
        const name = editorMapName.value.trim() || 'Ny karta';
        appState.editorMap.name = name;
        upsertMap(appState.editorMap);
        saveFeedback.textContent = `Kartan sparad som "${name}".`;
        setStatus('Editor Mode', `Redigerar: ${name}. Kartan finns nu i drive mode.`);
    }

    function screenToGround(clientX, clientY) {
        pointer.x = (clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObject(ground);
        return hits[0]?.point || null;
    }

    function findEditorObjectAt(point) {
        for (let index = mapObjectMeshes.length - 1; index >= 0; index -= 1) {
            const entry = mapObjectMeshes[index];
            if (entry.object.type === 'ramp') {
                const local = entry.mesh.worldToLocal(point.clone());
                if (Math.abs(local.x) <= 3.5 && Math.abs(local.z) <= ((entry.object.rampLength || 8) / 2) + 0.5) return entry.object.id;
            } else {
                const dx = point.x - entry.object.x;
                const dz = point.z - entry.object.z;
                if ((dx * dx) + (dz * dz) <= 6.2 * 6.2) return entry.object.id;
            }
        }
        return null;
    }

    function placeEditorObject(point) {
        if (!appState.editorMap) return;

        if (appState.selectedTool === 'delete') {
            const removeId = findEditorObjectAt(point);
            if (!removeId) return;
            appState.editorMap.objects = appState.editorMap.objects.filter((object) => object.id !== removeId);
            buildMapObjects(appState.editorMap);
            saveFeedback.textContent = 'Objekt borttaget.';
            return;
        }

        const object = {
            id: crypto.randomUUID(),
            type: appState.selectedTool,
            x: Math.round(point.x),
            z: Math.round(point.z),
            rotation: appState.selectedTool === 'ramp' ? appState.placementRotation : 0,
            rampLength: appState.selectedTool === 'ramp' ? appState.rampLength : undefined,
            rampHeight: appState.selectedTool === 'ramp' ? appState.rampHeight : undefined
        };
        appState.editorMap.objects.push(object);
        buildMapObjects(appState.editorMap);
        saveFeedback.textContent = `${object.type === 'ramp' ? 'Ramp' : 'Vattenbassäng'} placerad.`;
    }

    function updatePlacementPreview(clientX, clientY) {
        lastPointerPosition.x = clientX;
        lastPointerPosition.y = clientY;
        if (appState.mode !== 'editor' || appState.selectedTool === 'delete') return;
        const point = screenToGround(clientX, clientY);
        if (!point) return;
        placementPreview.position.set(
            Math.round(point.x),
            appState.selectedTool === 'water' ? 0.16 : Math.max(appState.rampHeight * 0.125, 0.4),
            Math.round(point.z)
        );
        placementPreview.rotation.set(0, appState.placementRotation, 0);
    }

    function panEditorCamera(deltaX, deltaY) {
        const panScale = editorCamera.distance * 0.018;
        const rightX = Math.cos(editorCamera.yaw);
        const rightZ = -Math.sin(editorCamera.yaw);
        const forwardX = Math.sin(editorCamera.yaw);
        const forwardZ = Math.cos(editorCamera.yaw);

        editorCamera.targetX += (-deltaX * rightX + deltaY * forwardX) * panScale;
        editorCamera.targetZ += (-deltaX * rightZ + deltaY * forwardZ) * panScale;
        clampEditorCamera();
    }

    function updateEditorKeyboardPan(delta) {
        if (appState.mode !== 'editor') return;
        if (isTypingTarget(document.activeElement)) return;

        let moveX = 0;
        let moveZ = 0;
        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;
        if (input.forward) moveZ -= 1;
        if (input.backward) moveZ += 1;

        if (!moveX && !moveZ) return;

        const length = Math.hypot(moveX, moveZ) || 1;
        moveX /= length;
        moveZ /= length;

        const speed = editorCamera.panSpeed * (editorCamera.distance / 80) * delta;
        const rightX = Math.cos(editorCamera.yaw);
        const rightZ = -Math.sin(editorCamera.yaw);
        const forwardX = Math.sin(editorCamera.yaw);
        const forwardZ = Math.cos(editorCamera.yaw);

        editorCamera.targetX += (moveX * rightX + moveZ * forwardX) * speed;
        editorCamera.targetZ += (moveX * rightZ + moveZ * forwardZ) * speed;
        clampEditorCamera();
    }

    function bindBtn(id, key) {
        const btn = document.getElementById(id);
        const down = (event) => {
            event.preventDefault();
            ensureEngineAudioStarted();
            input[key] = true;
            btn.classList.add('active');
        };
        const up = (event) => {
            event.preventDefault();
            input[key] = false;
            btn.classList.remove('active');
        };
        btn.addEventListener('pointerdown', down);
        btn.addEventListener('pointerup', up);
        btn.addEventListener('pointercancel', up);
        btn.addEventListener('pointerleave', up);
    }

    bindBtn('btn-gas', 'forward');
    bindBtn('btn-brake', 'backward');
    bindBtn('btn-left', 'left');
    bindBtn('btn-right', 'right');

    window.addEventListener('keydown', (event) => {
        ensureEngineAudioStarted();
        if (isTypingTarget(event.target)) return;
        if (event.key === 'ArrowUp' || event.key === 'w') input.forward = true;
        if (event.key === 'ArrowDown' || event.key === 's') input.backward = true;
        if (event.key === 'ArrowLeft' || event.key === 'a') input.left = true;
        if (event.key === 'ArrowRight' || event.key === 'd') input.right = true;

        if (appState.mode === 'editor') {
            if (event.key.toLowerCase() === 'q') {
                appState.placementRotation -= Math.PI / 12;
            }
            if (event.key.toLowerCase() === 'e') {
                appState.placementRotation += Math.PI / 12;
            }
            updatePlacementPreview(window.innerWidth / 2, window.innerHeight / 2);
        }
    });

    window.addEventListener('keyup', (event) => {
        if (isTypingTarget(event.target)) return;
        if (event.key === 'ArrowUp' || event.key === 'w') input.forward = false;
        if (event.key === 'ArrowDown' || event.key === 's') input.backward = false;
        if (event.key === 'ArrowLeft' || event.key === 'a') input.left = false;
        if (event.key === 'ArrowRight' || event.key === 'd') input.right = false;
    });

    window.addEventListener('pointerdown', ensureEngineAudioStarted, { passive: true });

    renderer.domElement.addEventListener('contextmenu', (event) => {
        if (appState.mode === 'editor') {
            event.preventDefault();
        }
    });

    renderer.domElement.addEventListener('wheel', (event) => {
        if (appState.mode !== 'editor') return;
        event.preventDefault();
        editorCamera.distance *= 1 + (event.deltaY * editorCamera.zoomSpeed * 0.001);
        clampEditorCamera();
        updatePlacementPreview(lastPointerPosition.x, lastPointerPosition.y);
    }, { passive: false });

    renderer.domElement.addEventListener('pointermove', (event) => {
        updatePlacementPreview(event.clientX, event.clientY);

        if (appState.mode !== 'editor' || event.pointerId !== editorPointerState.pointerId || !editorPointerState.mode) {
            return;
        }

        const deltaX = event.clientX - editorPointerState.lastX;
        const deltaY = event.clientY - editorPointerState.lastY;
        if (Math.abs(deltaX) > 1 || Math.abs(deltaY) > 1) {
            editorPointerState.moved = true;
        }

        if (editorPointerState.mode === 'rotate') {
            editorCamera.yaw -= deltaX * editorCamera.rotateSpeed;
            editorCamera.pitch -= deltaY * editorCamera.rotateSpeed * 0.7;
            clampEditorCamera();
        } else if (editorPointerState.mode === 'pan') {
            panEditorCamera(deltaX, deltaY);
        }

        editorPointerState.lastX = event.clientX;
        editorPointerState.lastY = event.clientY;
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
        if (appState.mode !== 'editor') return;

        editorPointerState.pointerId = event.pointerId;
        editorPointerState.lastX = event.clientX;
        editorPointerState.lastY = event.clientY;
        editorPointerState.moved = false;

        if (event.button === 2) {
            editorPointerState.mode = 'rotate';
            renderer.domElement.setPointerCapture(event.pointerId);
            return;
        }

        if (event.button === 1 || (event.button === 0 && event.shiftKey)) {
            editorPointerState.mode = 'pan';
            renderer.domElement.setPointerCapture(event.pointerId);
            return;
        }

        if (event.button === 0) {
            editorPointerState.mode = 'place';
        }
    });

    renderer.domElement.addEventListener('pointerup', (event) => {
        if (appState.mode !== 'editor' || event.pointerId !== editorPointerState.pointerId) return;

        const shouldPlace = editorPointerState.mode === 'place' && !editorPointerState.moved && event.button === 0;
        if (shouldPlace) {
            const point = screenToGround(event.clientX, event.clientY);
            if (point) placeEditorObject(point);
            updatePlacementPreview(event.clientX, event.clientY);
        }

        if (renderer.domElement.hasPointerCapture(event.pointerId)) {
            renderer.domElement.releasePointerCapture(event.pointerId);
        }
        editorPointerState.pointerId = null;
        editorPointerState.mode = null;
        editorPointerState.moved = false;
    });

    renderer.domElement.addEventListener('pointercancel', (event) => {
        if (event.pointerId !== editorPointerState.pointerId) return;
        if (renderer.domElement.hasPointerCapture(event.pointerId)) {
            renderer.domElement.releasePointerCapture(event.pointerId);
        }
        editorPointerState.pointerId = null;
        editorPointerState.mode = null;
        editorPointerState.moved = false;
    });

    modeCards.forEach((card) => {
        card.addEventListener('click', () => setMenuMode(card.dataset.mode));
    });

    menuMapSelect.addEventListener('change', () => {
        appState.currentMapId = menuMapSelect.value;
        const current = getCurrentMap();
        if (appState.selectedMenuMode === 'editor' && current && !current.builtIn) {
            menuMapName.value = current.name;
        }
    });

    startButton.addEventListener('click', () => {
        const mapId = menuMapSelect.value;
        if (appState.selectedMenuMode === 'drive') {
            openDriveMode(mapId);
        } else {
            openEditorMode(mapId, menuMapName.value);
        }
    });

    toolRamp.addEventListener('click', () => {
        appState.selectedTool = 'ramp';
        updateToolButtons();
    });
    toolWater.addEventListener('click', () => {
        appState.selectedTool = 'water';
        updateToolButtons();
    });
    toolDelete.addEventListener('click', () => {
        appState.selectedTool = 'delete';
        updateToolButtons();
    });

    rotateLeftButton.addEventListener('click', () => {
        appState.placementRotation -= Math.PI / 12;
        updatePlacementPreview(window.innerWidth / 2, window.innerHeight / 2);
    });
    rotateRightButton.addEventListener('click', () => {
        appState.placementRotation += Math.PI / 12;
        updatePlacementPreview(window.innerWidth / 2, window.innerHeight / 2);
    });

    rampLengthInput.addEventListener('input', () => {
        appState.rampLength = THREE.MathUtils.clamp(Number(rampLengthInput.value) || 8, rampLimits.minLength, rampLimits.maxLength);
        rampLengthInput.value = String(appState.rampLength);
        updateToolButtons();
        updatePlacementPreview(lastPointerPosition.x, lastPointerPosition.y);
    });

    rampHeightInput.addEventListener('input', () => {
        appState.rampHeight = THREE.MathUtils.clamp(Number(rampHeightInput.value) || 2, rampLimits.minHeight, rampLimits.maxHeight);
        rampHeightInput.value = String(appState.rampHeight);
        updateToolButtons();
        updatePlacementPreview(lastPointerPosition.x, lastPointerPosition.y);
    });

    saveMapButton.addEventListener('click', saveEditorMap);
    testDriveButton.addEventListener('click', startEditorTestDrive);
    returnEditorButton.addEventListener('click', returnFromTestDrive);

    newMapButton.addEventListener('click', () => {
        appState.editorMap = createBlankMap('Ny karta');
        editorMapName.value = appState.editorMap.name;
        buildMapObjects(appState.editorMap);
        resetEditorCamera();
        saveFeedback.textContent = 'Tom karta skapad.';
        setStatus('Editor Mode', 'Redigerar: Ny karta. Placera ut objekt och spara när du är klar.');
    });

    backMenuButton.addEventListener('click', () => {
        appState.testDriveActive = false;
        refreshMaps();
        setAppMode('menu');
    });

    window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && appState.mode === 'drive' && appState.testDriveActive) {
            returnFromTestDrive();
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.1);
        updatePhysics(delta);
        updateEditorKeyboardPan(delta);
        updateCamera();
        updateParticles(delta);
        updateSpeedometer();
        renderer.render(scene, camera);
    }

    refreshMaps();
    setMenuMode('drive');
    setAppMode('menu');
    loadMapIntoScene(getCurrentMap());
    animate();
</script>
</body>
</html>
