<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Mercedes GLS 580 - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="loading">Bearbetar Mercedes... <span id="percent">0</span>%</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 8, 20);  // Börja med bra avstånd
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Starkare ljus för att se modellen tydligt
        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(50, 100, 50);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // Mark
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(1000, 100));

        const carGroup = new THREE.Group();
        scene.add(carGroup);

        const cameraTarget = new THREE.Object3D();
        cameraTarget.position.set(0, 5, 15); 
        carGroup.add(cameraTarget);

let isReady = false;
        const fbxLoader = new FBXLoader();
        const objLoader = new OBJLoader();
        
        // Försök med OBJ först (bättre mesh-stöd)
        objLoader.load('uploads_files_2787791_Mercedes+Benz+GLS+580.obj', (object) => {
            console.log("OBJ laddad, fixar material...");
            
            object.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        metalness: 0.3,
                        roughness: 0.4
                    });
                }
            });
            
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            console.log("OBJ size:", size, "maxDim:", maxDim);
            const scale = 20 / maxDim;
            object.scale.set(scale, scale, scale);
            object.position.set(0, 0, 0);
            
            let meshCount = 0;
            object.traverse(c => { if(c.isMesh) meshCount++; });
            console.log("OBJ meshes:", meshCount);
            
            carGroup.add(object);
            isReady = true;
            document.getElementById('loading').style.display = 'none';
        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            document.getElementById('percent').innerText = p;
        }, (err) => {
            console.log("OBJ failed, trying FBX...");
            loadFBX();
        });

        function loadFBX() {
            fbxLoader.load('uploads_files_2787791_Mercedes+Benz+GLS+580.fbx', (object) => {
            console.log("Modell inladdad, fixar material...");

            // FIXA MATERIAL - Behåll originla om de har texturer, annars använd Mercedes-färger
            const carBodyColor = 0xffffff;  // Vit
            const carGlassColor = 0x88ccff; // Ljust glas
            const carChromeColor = 0xeeeeee; // Ljus krom
            
            object.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    const name = child.name.toLowerCase();
                    let color = carBodyColor;
                    let metalness = 0.8;
                    let roughness = 0.2;
                    
                    if (name.includes('glass') || name.includes('window') || name.includes('glas')) {
                        color = carGlassColor;
                        metalness = 0.1;
                        roughness = 0.1;
                    } else if (name.includes('chrome') || name.includes('metall') || name.includes('wheel')) {
                        color = carChromeColor;
                        metalness = 0.9;
                        roughness = 0.1;
                    } else if (name.includes('interior') || name.includes('seat')) {
                        color = 0x333333;
                        metalness = 0.1;
                        roughness = 0.8;
                    } else if (name.includes('tire') || name.includes('däck') || name.includes('gummi')) {
                        color = 0x111111;
                        metalness = 0.0;
                        roughness = 0.9;
                    }
                    
                    child.material = new THREE.MeshStandardMaterial({
                        color: color,
                        metalness: metalness,
                        roughness: roughness
                    });
                }
            });

            // BERÄKNA STORLEK (FBX kan vara enorm)
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            
            console.log("Model size:", size, "maxDim:", maxDim);
            
            // Skala: bilen blir ca 5 enheter lång
            const targetLength = 5;
            let scale = 1;
            if (maxDim > 0.01) {
                scale = targetLength / maxDim;
            }
            console.log("Scale:", scale);
            object.scale.set(scale, scale, scale);

            // Sätt positionen enklare - direkt på marken
            object.position.set(0, 0, 0);
            
            // Roterar inte - behåller original-orientering
            // object.rotation.y = Math.PI;

            console.log("Object position after scale:", object.position);
            console.log("Object scale:", object.scale);
            
            // Räkna meshes
            let meshCount = 0;
            object.traverse(c => { if(c.isMesh) meshCount++; });
            console.log("Total meshes:", meshCount);

            carGroup.add(object);
            isReady = true;
            document.getElementById('loading').style.display = 'none';
        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            document.getElementById('percent').innerText = p;
        }, (err) => {
            console.error("Fel vid laddning:", err);
        });
        }

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        let speed = 0;
        function update() {
            if (!isReady) return;

            if (keys.w) speed -= 0.02;
            if (keys.s) speed += 0.02;
            speed *= 0.96;

            if (Math.abs(speed) > 0.01) {
                const dir = speed > 0 ? -1 : 1;
                if (keys.a) carGroup.rotation.y += 0.04 * dir;
                if (keys.d) carGroup.rotation.y -= 0.04 * dir;
            }

            carGroup.translateZ(speed);

            // Enkel kamera - följer bilen bakifrån
            const offset = new THREE.Vector3(0, 15, 40);
            offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), carGroup.rotation.y);
            camera.position.copy(carGroup.position).add(offset);
            camera.lookAt(carGroup.position.x, carGroup.position.y + 3, carGroup.position.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
