<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Koenigsegg Agera - Advanced Racing Track</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; z-index: 100; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff; border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: white; z-index: 10;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; font-size: 16px;
            pointer-events: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="letter-spacing: 5px; font-weight: 200;">BUILDING TRACK...</div>
        <div id="percent" style="font-size: 12px; margin-top: 10px; opacity: 0.5;">0%</div>
    </div>
    <div id="ui">
        <strong>KONTROLLER</strong><br>
        W / S - Gasa & Bromsa<br>
        A / D - Styr<br>
        MELLANSLAG - Hoppa/Handbroms<br>
        <span id="speedometer" style="font-size: 24px; color: #ffeb3b; display: block; margin-top: 10px;">0 km/h</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0015);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 5000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(200, 300, 100);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(4096, 4096);
        sunLight.shadow.camera.left = -300;
        sunLight.shadow.camera.right = 300;
        sunLight.shadow.camera.top = 300;
        sunLight.shadow.camera.bottom = -300;
        sunLight.shadow.camera.far = 1000;
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // TERRÄNG FUNKTION (Skapar mjuka kullar)
        function getGroundHeight(x, z) {
            let h = 0;
            h += Math.sin(x * 0.005) * Math.cos(z * 0.005) * 30; // Stora kullar
            h += Math.sin(x * 0.02) * Math.sin(z * 0.02) * 5;    // Mellanstora ojämnheter
            return h;
        }

        // TERRÄNG MESH
        const groundSize = 4000;
        const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, 256, 256);
        groundGeo.rotateX(-Math.PI / 2);
        const pos = groundGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            pos.setY(i, getGroundHeight(pos.getX(i), pos.getZ(i)));
        }
        groundGeo.computeVertexNormals();
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d6e36, roughness: 1.0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        scene.add(ground);

        // SLINGRANDE RACINGBANA (Figure-8 layout)
        const trackPoints = [
            new THREE.Vector3(0, 0, 400),
            new THREE.Vector3(400, 0, 400),
            new THREE.Vector3(600, 0, 0),
            new THREE.Vector3(300, 0, -400),
            new THREE.Vector3(0, 0, -100),
            new THREE.Vector3(-300, 0, 400),
            new THREE.Vector3(-600, 0, 0),
            new THREE.Vector3(-400, 0, -400),
            new THREE.Vector3(0, 0, -400)
        ];
        const trackCurve = new THREE.CatmullRomCurve3(trackPoints, true);
        
        // Skapa banan med en TubeGeometry som vi plattar till
        const trackGeo = new THREE.TubeGeometry(trackCurve, 300, 20, 8, true);
        
        // Platta till banan FÖRST ("Tube" blir platt väg)
        trackGeo.scale(1, 0.02, 1);

        const trackVertices = trackGeo.attributes.position;
        for (let i = 0; i < trackVertices.count; i++) {
            let vx = trackVertices.getX(i);
            let vz = trackVertices.getZ(i);
            // Sätt den absoluta höjden efter att vi skalat ner tjockleken
            let vy = getGroundHeight(vx, vz) + 0.5; 
            trackVertices.setY(i, vy);
        }
        trackGeo.computeVertexNormals();

        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const trackMesh = new THREE.Mesh(trackGeo, trackMat);
        trackMesh.receiveShadow = true;
        scene.add(trackMesh);

        // BIL-HIERARKI & FYSIK VARIABLAR
        const carGroup = new THREE.Group();
        const carPitchRollGroup = new THREE.Group(); // Hanterar lutning i backar
        carGroup.add(carPitchRollGroup);
        scene.add(carGroup);

        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.1, clearcoat: 1.0 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x000000, transparent: true, opacity: 0.4, transmission: 0.8 });

        let isReady = false;
        
        function applyMaterials(object) {
            object.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    const name = child.name.toLowerCase();
                    if (name.includes('glass') || name.includes('window')) child.material = glassMat;
                    else if (name.includes('tire') || name.includes('wheel')) child.material = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
                    else child.material = bodyMat;
                }
            });

            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const scale = 8 / Math.max(size.x, size.y, size.z);
            object.scale.setScalar(scale);

            const finalBox = new THREE.Box3().setFromObject(object);
            const center = finalBox.getCenter(new THREE.Vector3());
            object.position.set(-center.x, -finalBox.min.y, -center.z);

            const modelMesh = new THREE.Group();
            modelMesh.add(object);
            // Ingen extra rotation här om den är felvänd
            carPitchRollGroup.add(modelMesh);
            
            // Starta på banan - justerad höjd
            carGroup.position.copy(trackCurve.getPointAt(0));
            carGroup.position.y = getGroundHeight(carGroup.position.x, carGroup.position.z) + 1.5;

            isReady = true;
            document.getElementById('loading').style.display = 'none';
        }

        const fbxLoader = new FBXLoader();
        const objLoader = new OBJLoader();
        fbxLoader.load('models/82-koenigsegg-agera/koenigsegg.fbx', applyMaterials, 
            (xhr) => { document.getElementById('percent').innerText = Math.round(xhr.loaded/xhr.total*100) + '%'; },
            (err) => { objLoader.load('models/82-koenigsegg-agera/koenigsegg.obj', applyMaterials); }
        );

        // KONTROLLER
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // ADVANCED PHYSICS VARIABLES
        let velocity = new THREE.Vector3();
        let acceleration = 0;
        let steeringAngle = 0;
        let carHeading = 0; // Bilens faktiska rotation i världen
        let verticalVelocity = 0;
        
        const MAX_SPEED = 2.5;
        const ACCEL_RATE = 0.03;
        const BRAKE_RATE = 0.05;
        const DRAG = 0.98;         // Luftmotstånd
        const GRIP = 0.92;         // Hur mycket bilen glider i sidled (lägre = isigt)
        const GRAVITY = 0.015;

        // Räknar ut markens lutning (Normal-vektor) mha matematik
        function getSurfaceNormal(x, z) {
            const delta = 0.5;
            const hC = getGroundHeight(x, z);
            const hX = getGroundHeight(x + delta, z);
            const hZ = getGroundHeight(x, z + delta);
            
            const dx = new THREE.Vector3(delta, hX - hC, 0);
            const dz = new THREE.Vector3(0, hZ - hC, delta);
            
            const normal = new THREE.Vector3().crossVectors(dz, dx).normalize();
            return normal;
        }

        function update() {
            if (!isReady) return;

            // 1. GAS OCH BROMS (Framåt/Bakåt kraft)
            if (keys.w) acceleration = ACCEL_RATE;
            else if (keys.s) acceleration = -BRAKE_RATE;
            else acceleration = 0;

            // 2. STYRNING
            let speedScalar = velocity.length();
            let forwardSpeed = velocity.dot(new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading)));
            
            // Kan bara styra om vi har fart. Styrenheten minskar något vid extremt höga hastigheter
            if (speedScalar > 0.05) {
                const turnSpeed = 0.04 * Math.max(0.3, 1.0 - (speedScalar / MAX_SPEED) * 0.5);
                const dir = forwardSpeed > 0 ? 1 : -1; 
                
                if (keys.a) carHeading -= turnSpeed * dir;
                if (keys.d) carHeading += turnSpeed * dir;
            }

            carGroup.rotation.y = carHeading;

            // 3. APPLICERA KRAFT PÅ HASTIGHETEN (Möjliggör Drifting)
            const forwardVec = new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading));
            
            // Lägg till gas
            velocity.add(forwardVec.clone().multiplyScalar(acceleration));
            
            // Friktion och Grip (Eliminera hastighet som inte är i bilens riktning = grip)
            const rightVec = new THREE.Vector3(forwardVec.z, 0, -forwardVec.x);
            const lateralSpeed = velocity.dot(rightVec);
            
            // Dra bort lite av sidohastigheten beroende på väggrepp (drifting effekt)
            velocity.sub(rightVec.multiplyScalar(lateralSpeed * (keys[' '] ? 0.3 : GRIP)));
            
            // Luftmotstånd
            velocity.multiplyScalar(DRAG);

            // Begränsa maxfart
            if (velocity.length() > MAX_SPEED) {
                velocity.normalize().multiplyScalar(MAX_SPEED);
            }

            // Flytta bilen X och Z
            carGroup.position.x += velocity.x;
            carGroup.position.z += velocity.z;

            // Uppdatera Hastighetsmätaren
            const kmh = Math.round(speedScalar * 120); // Skalfaktor för UI
            document.getElementById('speedometer').innerText = kmh + " km/h";

            // 4. TERRÄNG OCH Y-AXEL FYSIK
            const groundOffset = 0.55; // Banan ligger på +0.5, så vi lägger oss strax ovanför
            const currentGroundHeight = getGroundHeight(carGroup.position.x, carGroup.position.z) + groundOffset;
            
            verticalVelocity -= GRAVITY;
            carGroup.position.y += verticalVelocity;

            let isOnGround = false;

            // Kollision med marken/banan
            if (carGroup.position.y <= currentGroundHeight) {
                carGroup.position.y = currentGroundHeight;
                verticalVelocity = 0;
                isOnGround = true;

                // Hopp-funktion (fungerar bara på marken)
                if (keys[' '] && kmh < 30) { 
                    verticalVelocity = 0.3; // Litet skutt / hydraulik om man står nästan still
                }
            }

            // 5. LUTNING (Pitch & Roll)
            if (isOnGround) {
                const surfaceNormal = getSurfaceNormal(carGroup.position.x, carGroup.position.z);
                
                // Mjuk övergång för lutningen
                const targetQuaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), surfaceNormal);
                carPitchRollGroup.quaternion.slerp(targetQuaternion, 0.2);
            } else {
                // I luften: bilen planar ut sig något i nose-dive
                carPitchRollGroup.rotation.x *= 0.98;
                carPitchRollGroup.rotation.z *= 0.98;
            }

            // 6. DYNAMISK KAMERA
            const lookAheadOffset = velocity.clone().multiplyScalar(10); // Titta lite framför bilen
            
            // Placera kameran bakom bilen, svänger med bilen men med viss fördröjning
            const idealCameraOffset = new THREE.Vector3(0, 6, -22);
            idealCameraOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), carHeading);
            idealCameraOffset.add(carGroup.position);

            camera.position.lerp(idealCameraOffset, 0.1);
            
            const targetLook = carGroup.position.clone().add(new THREE.Vector3(0, 2, 0)).add(lookAheadOffset);
            camera.lookAt(targetLook);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
